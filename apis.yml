aid: amazon-mainframe-modernization
name: Amazon Mainframe Modernization
description: >-
  AWS Mainframe Modernization provides tools and resources to help you plan and
  implement migration and modernization of your mainframe applications to AWS.
  It supports automated refactoring and replatforming of COBOL applications
  to run natively on AWS.
